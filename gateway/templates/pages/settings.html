{{define "settings"}}
<h1 class="text-2xl font-bold mb-4">Settings</h1>
<div class="bg-white rounded shadow p-6 max-w-lg">
<h2 class="font-semibold mb-4">Sync Configuration</h2>
<div class="flex items-center gap-2">
<span class="text-sm text-gray-600">Scanlog Sync Interval:</span>
<input type="number" x-model="syncInterval" class="w-20 border rounded px-2 py-1 text-sm" min="5">
<span class="text-sm text-gray-500">seconds</span>
<button @click="saveSyncInterval()" class="px-3 py-1 text-sm bg-blue-600 text-white rounded hover:bg-blue-700">Save</button>
</div>
</div>
{{end}}
