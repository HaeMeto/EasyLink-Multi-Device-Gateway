{{define "logs"}}
<h1 class="text-2xl font-bold mb-4">Console Logs</h1>
<div class="bg-gray-900 text-green-400 font-mono text-xs p-4 overflow-y-auto rounded" style="height:calc(100vh-12rem)" x-ref="logContainer">
<template x-if="store.logs.length===0"><div class="text-gray-500">No logs yet</div></template>
<template x-for="l in store.logs" :key="l.id">
<div class="py-0.5 flex gap-2">
<span class="text-gray-500" x-text="l.timestamp"></span>
<span class="font-semibold" :class="l.type === 'instance' ? 'text-blue-400' : l.type === 'device' ? 'text-yellow-400' : l.type === 'proxy' ? 'text-green-400' : l.type === 'watchdog' ? 'text-red-400' : 'text-gray-400'" x-text="'['+l.type+']'"></span>
<span x-text="l.message"></span>
</div>
</template>
</div>
{{end}}
