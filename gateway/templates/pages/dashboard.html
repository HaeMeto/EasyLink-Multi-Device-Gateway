{{define "dashboard"}}
<h1 class="text-2xl font-bold mb-4">Dashboard</h1>
<div class="grid grid-cols-4 gap-4 mb-6">
<div class="bg-white p-4 rounded shadow"><div class="text-sm text-gray-500">Total Instances</div><div class="text-2xl font-bold" x-text="store.health.total"></div></div>
<div class="bg-white p-4 rounded shadow"><div class="text-sm text-gray-500">Running</div><div class="text-2xl font-bold text-green-600" x-text="store.health.running"></div></div>
<div class="bg-white p-4 rounded shadow"><div class="text-sm text-gray-500">Errors</div><div class="text-2xl font-bold text-red-600" x-text="store.health.error"></div></div>
<div class="bg-white p-4 rounded shadow flex items-center justify-center">
<button @click="store.syncReload()" class="px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">Sync Reload</button>
</div>
</div>
<div class="bg-white p-4 rounded shadow">
<h2 class="font-semibold mb-2">Instances</h2>
<table class="w-full text-sm" x-show="store.health.instances && store.health.instances.length > 0">
<thead><tr class="text-left border-b"><th class="py-1">#</th><th>Status</th><th>Port</th><th>Alive</th><th>HTTP</th></tr></thead>
<tbody>
<template x-for="i in store.health.instances" :key="i.sdk_no">
<tr class="border-b"><td class="py-1" x-text="i.sdk_no"></td>
<td><span class="px-2 py-0.5 rounded text-xs text-white"
:class="i.status==='RUNNING'?'bg-green-600':i.status==='ERROR'?'bg-red-600':'bg-gray-500'"
x-text="i.status"></span></td>
<td x-text="i.port"></td>
<td><span class="text-xs" :class="i.alive?'text-green-600':'text-red-600'" x-text="i.alive?'Yes':'No'"></span></td>
<td><span class="text-xs" :class="i.http_ok?'text-green-600':'text-red-600'" x-text="i.http_ok?'Yes':'No'"></span></td>
</tr>
</template>
</tbody>
</table>
<div x-show="!store.health.instances || store.health.instances.length === 0" class="text-gray-400 text-sm py-4 text-center">No instances</div>
</div>
{{end}}
