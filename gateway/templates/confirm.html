{{define "confirm"}}
<div x-show="confirm.show" class="fixed inset-0 z-40 flex items-center justify-center bg-black/50">
<div class="bg-white rounded-lg shadow-xl w-96 p-6">
<h3 class="text-lg font-semibold mb-3" x-text="confirm.title"></h3>
<p class="text-gray-600 mb-6" x-text="confirm.msg"></p>
<div class="flex justify-end gap-2">
<button @click="confirm.show=false" class="px-4 py-2 text-sm text-gray-600 border rounded hover:bg-gray-100">Cancel</button>
<button @click="confirm.action(); confirm.show=false" class="px-4 py-2 text-sm text-white bg-red-600 rounded hover:bg-red-700">Confirm</button>
</div>
</div>
</div>
{{end}}
