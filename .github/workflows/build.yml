name: Build easylink-gate.exe

on:
 push:
 branches: [main, master]
 pull_request:
 branches: [main, master]

jobs:
 build:
 runs-on: windows-latest
 steps:
 - name: Checkout code
 uses: actions/checkout@v4

 - name: Setup Go
 uses: actions/setup-go@v5
 with:
 go-version: '1.25'

 - name: Copy core to template
 shell: pwsh
 run: |
 Copy-Item -Path "core\*" -Destination "gateway\template\" -Recurse -Force
 Set-Content -Path "gateway\template\Device.ini" -Value "" -Encoding UTF8
 Remove-Item -Path "gateway\template\SetDef.fin" -Force -ErrorAction SilentlyContinue
 Remove-Item -Path "gateway\template\db_temp.ldb" -Force -ErrorAction SilentlyContinue
 Remove-Item -Path "gateway\template\Log" -Recurse -Force -ErrorAction SilentlyContinue
 New-Item -ItemType Directory -Path "gateway\template\Log" -Force | Out-Null

 - name: Build
 shell: pwsh
 run: |
 Set-Location -LiteralPath "gateway"
 $env:CGO_ENABLED = "0"
 go build -ldflags="-s -w" -o easylink-gate.exe .

 - name: Compress artifact
 shell: pwsh
 run: Compress-Archive -Path "gateway\easylink-gate.exe" -DestinationPath "easylink-gate.zip"

 - name: Upload artifact (PR)
 if: github.event_name == 'pull_request'
 uses: actions/upload-artifact@v4
 with:
 name: easylink-gate
 path: easylink-gate.zip

 - name: Create Release
 if: github.event_name == 'push'
 uses: softprops/action-gh-release@v2
 with:
 name: easylink-gate-${{ github.run_number }}
 tag_name: v${{ github.run_number }}
 files: easylink-gate.zip
 generate_release_notes: true
